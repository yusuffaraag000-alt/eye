<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional 3D Model Explorer</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#0b0b12;
color:white;
}

#sidebar{
position:fixed;
left:20px;
top:20px;
bottom:20px;
width:280px;
background:#141420;
border-radius:12px;
padding:15px;
overflow:auto;
z-index:10;
}

#search{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#222;
color:white;
}

#parts{
list-style:none;
padding:0;
margin:0;
}

#parts li{
padding:10px;
margin-bottom:6px;
background:#1e1e2e;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

#parts li:hover{
background:#4a4aff;
}

#parts li.active{
background:#6a6aff;
}

canvas{
display:block;
}

</style>

</head>
<body>

<div id="sidebar">

<input id="search" placeholder="Search part...">

<ul id="parts"></ul>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.128.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"
}
}
</script>

<script type="module">

import * as THREE from 'three'
import {OrbitControls} from 'three/addons/controls/OrbitControls.js'
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js'

/* scene */

const scene=new THREE.Scene()
scene.background=new THREE.Color(0x0f0f18)

/* camera */

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(6,4,8)

/* renderer */

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

document.body.appendChild(renderer.domElement)

/* controls */

const controls=new OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

/* lights */

scene.add(new THREE.AmbientLight(0xffffff,.7))

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

/* raycaster */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

/* variables */

let parts=[]
let meshes=[]
let selected=null
let hover=null

/* load model */

const loader=new GLTFLoader()

loader.load("eye.glb",gltf=>{

scene.add(gltf.scene)

gltf.scene.traverse(o=>{

if(o.isMesh){

const name=o.name||""

if(name.toLowerCase().includes("object")) return

meshes.push(o)

parts.push({
name:name,
mesh:o,
material:o.material.clone()
})

}

})

buildList()

fitCamera(gltf.scene)

})

/* sidebar */

function buildList(){

const ul=document.getElementById("parts")

parts.forEach((p,i)=>{

const li=document.createElement("li")
li.textContent=p.name

li.onclick=()=>selectPart(p,li)

ul.appendChild(li)

})

}

/* select part */

function selectPart(part,li){

highlight(part)
focus(part)

document
.querySelectorAll("#parts li")
.forEach(e=>e.classList.remove("active"))

li.classList.add("active")

}

/* highlight */

function highlight(part){

if(selected){
selected.mesh.material=selected.material
}

const m=part.material.clone()
m.emissive=new THREE.Color(0xffaa00)
m.emissiveIntensity=.9

part.mesh.material=m

selected=part

}

/* focus camera */

function focus(part){

const box=new THREE.Box3().setFromObject(part.mesh)

const center=box.getCenter(new THREE.Vector3())
const size=box.getSize(new THREE.Vector3())

const max=Math.max(size.x,size.y,size.z)

animateCamera(center,max*2)

}

/* smooth camera */

function animateCamera(target,dist){

const start=camera.position.clone()

const end=new THREE.Vector3(
target.x+dist,
target.y+dist*.5,
target.z+dist
)

let t=0

function move(){

t+=.05

camera.position.lerpVectors(start,end,t)

controls.target.lerp(target,t)

if(t<1)requestAnimationFrame(move)

}

move()

}

/* fit model */

function fitCamera(obj){

const box=new THREE.Box3().setFromObject(obj)

const center=box.getCenter(new THREE.Vector3())
const size=box.getSize(new THREE.Vector3())

const max=Math.max(size.x,size.y,size.z)

camera.position.set(max,max,max*2)

controls.target.copy(center)

}

/* hover highlight */

window.addEventListener("mousemove",e=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObjects(meshes)

if(hit.length){

const mesh=hit[0].object

if(hover && hover!==mesh){
hover.material.emissive?.setHex(0x000000)
}

hover=mesh

if(mesh!==selected?.mesh){
mesh.material.emissive=new THREE.Color(0x4444ff)
}

}

})

/* search */

document.getElementById("search").oninput=e=>{

const v=e.target.value.toLowerCase()

document
.querySelectorAll("#parts li")
.forEach(li=>{

li.style.display=
li.textContent.toLowerCase().includes(v)
?"block":"none"

})

}

/* resize */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

/* render */

function animate(){

requestAnimationFrame(animate)

controls.update()
renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
